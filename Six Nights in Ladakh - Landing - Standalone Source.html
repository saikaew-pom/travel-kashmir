function Gallery() {
  const [i, setI] = useState(0);
  const [lb, setLb] = useState(false);
  const [auto, setAuto] = useState(false);
  const stripRef = React.useRef(null);
  const N = GALLERY.length;

  const go = React.useCallback((next) => {
    setI((prev) => (next + N) % N);
  }, [N]);

  // Auto-advance
  useEffect(() => {
    if (!auto || lb) return;
    const t = setInterval(() => setI((p) => (p + 1) % N), 4500);
    return () => clearInterval(t);
  }, [auto, lb, N]);

  // Keep active thumbnail in view in the filmstrip
  useEffect(() => {
    const track = stripRef.current;
    if (!track) return;
    const active = track.children[i];
    if (!active) return;
    const trackRect = track.getBoundingClientRect();
    const r = active.getBoundingClientRect();
    if (r.left < trackRect.left + 20 || r.right > trackRect.right - 20) {
      const offset = active.offsetLeft - (track.clientWidth / 2 - active.clientWidth / 2);
      track.scrollTo({ left: offset, behavior: 'smooth' });
    }
  }, [i]);

  // Keyboard nav when lightbox open
  useEffect(() => {
    if (!lb) return;
    const h = (e) => {
      if (e.key === 'Escape') setLb(false);
      if (e.key === 'ArrowLeft') go(i - 1);
      if (e.key === 'ArrowRight') go(i + 1);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [lb, i, go]);

  const pct = ((i + 1) / N) * 100;
  const num = (n) => String(n).padStart(2, '0');

  return (
    <section className="lp-gallery" id="gallery">
      <div className="head">
        <div>
          <div className="eyebrow"><span className="num">§ 02</span> Field photography</div>
          <h2>56 photographs.<br/>One <em>extraordinary</em> week.</h2>
        </div>
        <p>
          Every image was shot on a past departure by our guests and guides. The light in Ladakh does most of the work — we just have to show up. Use the arrows, scroll the filmstrip, or hit play.
        </p>
      </div>

      <div className="lp-slider">
        <div className="lp-stage" onClick={()=>setLb(true)}>
          {GALLERY.map((g, idx) => (
            <div key={idx} className={'slide' + (idx === i ? ' active' : '')}>
              <img src={g.src} alt="" loading={Math.abs(idx - i) < 3 ? 'eager' : 'lazy'} />
            </div>
          ))}
          <div className="corner">Travel &amp; Kashmir · Field Library</div>
          <button className="arrow prev" onClick={(e)=>{e.stopPropagation(); go(i-1);}} aria-label="Previous">←</button>
          <button className="arrow next" onClick={(e)=>{e.stopPropagation(); go(i+1);}} aria-label="Next">→</button>
          <button className="expand" onClick={(e)=>{e.stopPropagation(); setLb(true);}}>↗ View full</button>
        </div>

        <div className="lp-slider-meta">
          <div className="counter">
            <b>{num(i+1)}</b> / {num(N)}
          </div>
          <div className="progress">
            <div className="bar" style={{width: pct + '%'}}></div>
          </div>
          <div className="controls">
            <button className={'ctrl' + (auto ? ' on' : '')} onClick={()=>setAuto(a=>!a)}>
              {auto ? '❚❚ Pause' : '▶ Play'}
            </button>
            <button className="ctrl" onClick={()=>go(i-1)} aria-label="Previous">←</button>
            <button className="ctrl" onClick={()=>go(i+1)} aria-label="Next">→</button>
          </div>
        </div>

        <div className="lp-filmstrip">
          <div className="track" ref={stripRef}>
            {GALLERY.map((g, idx) => (
              <div key={idx} className={'thumb' + (idx === i ? ' active' : '')} onClick={()=>setI(idx)}>
                <img src={g.src} alt="" loading="lazy" />
              </div>
            ))}
          </div>
        </div>
      </div>

      {lb && (
        <div className="lightbox" onClick={()=>setLb(false)}>
          <button className="lb-close" onClick={(e)=>{e.stopPropagation(); setLb(false);}}>✕</button>
          <button className="lb-nav prev" onClick={(e)=>{e.stopPropagation(); go(i-1);}}>←</button>
          <button className="lb-nav next" onClick={(e)=>{e.stopPropagation(); go(i+1);}}>→</button>
          <img src={GALLERY[i].src} alt="" onClick={(e)=>e.stopPropagation()} />
          <div className="lb-cap">{num(i+1)} / {num(N)} · Esc to close · ← → to navigate</div>
        </div>
      )}
    </section>
  );
}

function FinalCTA() {
  const [form, setForm] = useState({ name: '', email: '', dates: '', party: '2', msg: '' });
  const [sent, setSent] = useState(false);
  const [err, setErr] = useState('');
  const submit = (e) => {
    e.preventDefault();
    if (!form.name.trim()) return setErr('Tell us your name.');
    if (!form.email.includes('@')) return setErr('A valid email, please.');
    setErr('');
    setSent(true);
  };
  return (
    <section className="lp-final" id="enquire">
      <div className="lp-final-inner">
        <div>
          <div className="eyebrow" style={{fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.18em',textTransform:'uppercase'}}>
            <span className="num">§ 08</span> Next step
          </div>
          <h2>When were you<br/>thinking of <em>coming?</em></h2>
          <p>
            Send us a paragraph about what you have in mind. We answer every enquiry within a working day, no auto-replies, no boilerplate.
          </p>
          <div className="urgency"><span className="dot"></span> 4 of 11 summer dates still open · last booked 9 hrs ago</div>
        </div>
        <form className="lp-form" onSubmit={submit}>
          {!sent ? (
            <>
              <div className="formhead">
                <div className="l">Trip enquiry</div>
                <div className="t">Tell us a little.</div>
              </div>
              <div className="field">
                <label>Your name</label>
                <input
                  type="text"
                  placeholder="Sarah Chen"
                  value={form.name}
                  onChange={(e)=>setForm({...form, name:e.target.value})}
                />
              </div>
              <div className="field">
                <label>Email</label>
                <input
                  type="email"
                  placeholder="sarah@inbox.com"
                  value={form.email}
                  onChange={(e)=>setForm({...form, email:e.target.value})}
                />
              </div>
              <div className="row2">
                <div className="field">
                  <label>Preferred month</label>
                  <select value={form.dates} onChange={(e)=>setForm({...form, dates:e.target.value})}>
                    <option value="">Choose…</option>
                    <option>April 2026</option>
                    <option>May 2026</option>
                    <option>June 2026</option>
                    <option>July 2026</option>
                    <option>August 2026</option>
                    <option>September 2026</option>
                    <option>October 2026</option>
                    <option>Flexible / unsure</option>
                  </select>
                </div>
                <div className="field">
                  <label>Party size</label>
                  <select value={form.party} onChange={(e)=>setForm({...form, party:e.target.value})}>
                    <option value="1">1 traveller</option>
                    <option value="2">2 travellers</option>
                    <option value="3">3 travellers</option>
                    <option value="4">4 travellers</option>
                  </select>
                </div>
              </div>
              <div className="field">
                <label>What you have in mind (optional)</label>
                <textarea
                  rows="3"
                  placeholder="Honeymoon, photography trip, want to add Kashmir, gentle pace…"
                  value={form.msg}
                  onChange={(e)=>setForm({...form, msg:e.target.value})}
                />
              </div>
              {err && <div className="err">{err}</div>}
              <button className="lp-cta big" type="submit">Send enquiry →</button>
              <div className="priv">No deposit yet · we reply in 1 working day · GDPR-friendly</div>
            </>
          ) : (
            <div className="success">
              <div className="big">Sent — thank you.</div>
              <p>
                We have your enquiry and one of us will reply personally within a working day.<br/>
                In the meantime, write to <a href="mailto:hello@travelkashmir.co" style={{color:'var(--terracotta)'}}>hello@travelkashmir.co</a> if there's anything urgent.
              </p>
            </div>
          )}
        </form>
      </div>
    </section>
  );
}
